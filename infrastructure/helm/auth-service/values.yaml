# ============================================================
# Values por defecto para auth-service
# Requisitos 13.2, 13.5
# ============================================================

replicaCount: 2

image:
  repository: <ACCOUNT_ID>.dkr.ecr.us-east-1.amazonaws.com/auth-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8080

# Recursos por pod
resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# HPA — Requisito 9.1: escalar cuando CPU > 70%
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

# Probes — Requisito 13.5: rollback automático si health check falla en 60s
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 20
  periodSeconds: 10
  failureThreshold: 3

# Variables de entorno
env:
  SPRING_PROFILES_ACTIVE: "prod"
  SERVER_PORT: "8080"

# ConfigMap adicional
configMap:
  data: {}

serviceAccount:
  create: true
  annotations: {}
