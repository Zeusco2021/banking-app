# Secrets are loaded from AWS Secrets Manager at runtime: /banking/auth-service/credentials
# DO NOT place any credentials, API keys or certificates in this file. See Req 12.3.

spring:
  application:
    name: auth-service
  cloud:
    aws:
      secretsmanager:
        enabled: true
      region:
        static: us-east-1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  kafka:
    bootstrap-servers: ${kafka.bootstrap-servers:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3

server:
  port: 8081
  ssl:
    enabled: true
    protocol: TLSv1.3
    enabled-protocols: TLSv1.3

jwt:
  access-token-ttl-minutes: 15
  refresh-token-ttl-days: 7
  issuer: banking-platform

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level [%X{correlationId}] [%X{traceId}] %logger{36} - %msg%n"

otel:
  exporter:
    otlp:
      endpoint: http://jaeger-collector:4317
  service:
    name: ${spring.application.name}
