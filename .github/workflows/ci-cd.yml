# ============================================================
# Pipeline CI/CD — Plataforma Bancaria
# Requisitos 13.3, 13.4: pipeline con tests de contrato y escaneo ECR
#
# Etapas:
#   1. build          — compilar y empaquetar con Maven
#   2. unit-tests     — ejecutar tests unitarios
#   3. contract-tests — Spring Cloud Contract tests
#   4. push-ecr       — construir imagen Docker y push a ECR con escaneo
#   5. deploy-staging — desplegar en staging con Helm
#   6. promote-prod   — promover a producción (requiere aprobación manual)
# ============================================================

name: CI/CD Pipeline — Plataforma Bancaria

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

jobs:
  # -------------------------------------------------------
  # Etapa 1: Build — compilar todos los módulos Maven
  # -------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar proyecto multi-módulo Maven
        run: mvn -B clean package -DskipTests

      - name: Subir artefactos compilados
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: '**/target/*.jar'
          retention-days: 1

  # -------------------------------------------------------
  # Etapa 2: Unit Tests — tests unitarios con JUnit 5
  # -------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests unitarios
        run: mvn -B test -Dgroups="unit"

      - name: Publicar resultados de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: '**/target/surefire-reports/*.xml'

  # -------------------------------------------------------
  # Etapa 3: Contract Tests — Spring Cloud Contract
  # Requisito 13.4: tests de contrato antes de promover a producción
  # -------------------------------------------------------
  contract-tests:
    name: Contract Tests (Spring Cloud Contract)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ejecutar tests de contrato (Spring Cloud Contract)
        run: mvn -B verify -Dgroups="contract" -pl auth-service,account-service,transaction-service,notification-service,audit-service

      - name: Publicar resultados de tests de contrato
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results
          path: '**/target/surefire-reports/*.xml'

  # -------------------------------------------------------
  # Etapa 4: Push a ECR con escaneo de vulnerabilidades
  # Requisito 13.3: imágenes en ECR con escaneo habilitado
  # Requisito 13.4: escaneo de vulnerabilidades en ECR
  # -------------------------------------------------------
  push-ecr:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: contract-tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        service:
          - auth-service
          - account-service
          - transaction-service
          - notification-service
          - audit-service
          - api-gateway-config
          - legacy-adapter
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compilar JAR del servicio
        run: mvn -B package -DskipTests -pl ${{ matrix.service }}

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Construir imagen Docker
        run: |
          docker build \
            -t ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:latest \
            -f ${{ matrix.service }}/Dockerfile \
            ${{ matrix.service }}/

      - name: Push imagen a ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:latest

      # Requisito 13.4: esperar resultado del escaneo de vulnerabilidades
      - name: Esperar escaneo de vulnerabilidades ECR
        run: |
          echo "Esperando resultado del escaneo de vulnerabilidades para ${{ matrix.service }}..."
          aws ecr wait image-scan-complete \
            --repository-name ${{ matrix.service }} \
            --image-id imageTag=${{ github.sha }} \
            --region ${{ env.AWS_REGION }}

      - name: Verificar vulnerabilidades críticas
        run: |
          FINDINGS=$(aws ecr describe-image-scan-findings \
            --repository-name ${{ matrix.service }} \
            --image-id imageTag=${{ github.sha }} \
            --region ${{ env.AWS_REGION }} \
            --query 'imageScanFindings.findingSeverityCounts.CRITICAL' \
            --output text)
          if [ "$FINDINGS" != "None" ] && [ "$FINDINGS" -gt "0" ]; then
            echo "ERROR: Se encontraron $FINDINGS vulnerabilidades CRÍTICAS en ${{ matrix.service }}"
            exit 1
          fi
          echo "Sin vulnerabilidades críticas en ${{ matrix.service }}"

  # -------------------------------------------------------
  # Etapa 5: Deploy a Staging con Helm
  # -------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: push-ecr
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configurar kubectl para EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }}-staging \
            --region ${{ env.AWS_REGION }}

      - name: Instalar Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Deploy todos los microservicios a staging
        run: |
          SERVICES="auth-service account-service transaction-service notification-service audit-service api-gateway-config legacy-adapter"
          for SERVICE in $SERVICES; do
            echo "Desplegando $SERVICE en staging..."
            helm upgrade --install $SERVICE infrastructure/helm/$SERVICE \
              --namespace banking-staging \
              --create-namespace \
              --set image.tag=${{ github.sha }} \
              --set image.repository=${{ env.ECR_REGISTRY }}/$SERVICE \
              --wait \
              --timeout 120s
          done

      - name: Verificar health checks en staging
        run: |
          kubectl rollout status deployment --namespace banking-staging --timeout=120s

  # -------------------------------------------------------
  # Etapa 6: Promote a Producción (requiere aprobación manual)
  # Requisito 13.5: rollback automático si health check falla en 60s
  # -------------------------------------------------------
  promote-prod:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configurar kubectl para EKS producción
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Instalar Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Deploy a producción con rollback automático
        run: |
          SERVICES="auth-service account-service transaction-service notification-service audit-service api-gateway-config legacy-adapter"
          for SERVICE in $SERVICES; do
            echo "Desplegando $SERVICE en producción..."
            # --atomic garantiza rollback automático si el health check falla
            # --timeout 60s — Requisito 13.5: rollback si falla en los primeros 60s
            helm upgrade --install $SERVICE infrastructure/helm/$SERVICE \
              --namespace banking-prod \
              --create-namespace \
              --set image.tag=${{ github.sha }} \
              --set image.repository=${{ env.ECR_REGISTRY }}/$SERVICE \
              --atomic \
              --timeout 60s \
              --cleanup-on-fail
          done

      - name: Verificar despliegue en producción
        run: |
          kubectl rollout status deployment --namespace banking-prod --timeout=120s
          echo "Despliegue en producción completado exitosamente"
